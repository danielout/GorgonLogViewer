name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ inputs.version }}\"/" package.json

      - name: Bump version in tauri.conf.json
        run: |
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${{ inputs.version }}\"/" src-tauri/tauri.conf.json

      - name: Bump version in Cargo.toml
        run: |
          sed -i "0,/^version = \"[^\"]*\"/s/^version = \"[^\"]*\"/version = \"${{ inputs.version }}\"/" src-tauri/Cargo.toml

      - name: Commit and tag
        run: |
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to ${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

  build:
    needs: bump-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Generate reference data
        run: npm run generate-reference

      - name: Run tests
        run: npm test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: "v${{ inputs.version }}"
          releaseDraft: true
          prerelease: false

  publish:
    needs: [bump-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(bash scripts/generate-release-notes.sh "${{ inputs.version }}")
          echo "notes<<ENDOFNOTES" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "ENDOFNOTES" >> "$GITHUB_OUTPUT"

      - name: Update release with notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ inputs.version }}" \
            --draft=false \
            --notes "${{ steps.notes.outputs.notes }}"
